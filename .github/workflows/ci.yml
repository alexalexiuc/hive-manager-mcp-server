name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate E2E secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          AUTH_API_KEY: ${{ secrets.AUTH_API_KEY }}
          E2E_SPREADSHEET_ID: ${{ vars.E2E_SPREADSHEET_ID || secrets.E2E_SPREADSHEET_ID }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing secret GOOGLE_SERVICE_ACCOUNT_JSON required for e2e tests."
            exit 1
          fi
          if [ -z "$AUTH_API_KEY" ]; then
            echo "::error::Missing secret AUTH_API_KEY required for e2e tests."
            exit 1
          fi
          if [ -z "$E2E_SPREADSHEET_ID" ]; then
            echo "::error::Missing E2E_SPREADSHEET_ID required for e2e tests."
            exit 1
          fi

      - name: Run E2E tests
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          AUTH_API_KEY: ${{ secrets.AUTH_API_KEY }}
          E2E_SPREADSHEET_ID: ${{ vars.E2E_SPREADSHEET_ID || secrets.E2E_SPREADSHEET_ID }}
        run: npm run test:e2e
